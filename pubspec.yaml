name: finflow_app
description: FinFlow AI Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.1
  rxdart: ^0.27.7
  flutter_secure_storage: ^9.0.0
  flutter_secure_storage_web: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  pdfrx: ^2.4.7
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.2+4
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/lang/en.json

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf